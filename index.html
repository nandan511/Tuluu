<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
height:100vh;
overflow-x:hidden;
background:linear-gradient(135deg,#1f1c2c,#ff4e8a);
display:flex;
justify-content:center;
align-items:center;
color:white;
position:relative;
}

.container{

width:90%;
max-width:950px;
padding:40px;
border-radius:35px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.08);
box-shadow:0 0 40px rgba(255,255,255,0.15);
text-align:center;
z-index:2;

}

h1{

font-size:58px;
margin-bottom:25px;
font-weight:600;
text-shadow:0 0 20px rgba(255,255,255,0.7);

}

.message{

font-size:22px;
line-height:1.9;
color:#f5f5f5;

}

.photos{

margin-top:40px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;

}

.photos img{

width:220px;
height:240px;
object-fit:cover;
border-radius:25px;
transition:0.4s;
box-shadow:0 0 25px rgba(255,255,255,0.2);

}

.photos img:hover{

transform:translateY(-10px) scale(1.03);
box-shadow:0 0 35px rgba(255,255,255,0.6);

}

button{

margin-top:45px;
padding:18px 40px;
border:none;
border-radius:50px;
background:rgba(255,255,255,0.15);
color:white;
font-size:20px;
font-weight:600;
cursor:pointer;
backdrop-filter:blur(10px);
transition:0.4s;
box-shadow:0 0 20px rgba(255,255,255,0.15);

}

button:hover{

transform:scale(1.08);
background:white;
color:#ff4e8a;

}

#surprise{

display:none;
margin-top:50px;
animation:fade 1.5s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.final-text{

font-size:38px;
font-weight:600;
line-height:1.8;
text-shadow:0 0 20px rgba(255,255,255,0.5);

}

.cat{

width:300px;
margin-top:30px;
border-radius:30px;
box-shadow:0 0 35px rgba(255,255,255,0.4);

}

.heart{

position:absolute;
font-size:22px;
animation:float 6s linear infinite;
opacity:0.8;

}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-10vh);
opacity:0;
}

}

.balloon{

position:absolute;
font-size:45px;
bottom:-100px;
animation:balloonFloat 10s linear infinite;
cursor:pointer;

}

@keyframes balloonFloat{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

.pop{

animation:pop 0.3s forwards;

}

@keyframes pop{

0%{
transform:scale(1);
opacity:1;
}

100%{
transform:scale(2);
opacity:0;
}

}

</style>

</head>

<body>

<audio autoplay loop>

<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-love-11786.mp3" type="audio/mpeg">

</audio>

<div class="container">

<h1>Happy Birthday Tulu ❤️</h1>

<p class="message">

You are the most beautiful part of my life ❤️<br><br>

Since the day you came into my world,<br>
everything feels more beautiful ✨

</p>

<div class="photos">

<img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=800">

<img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659?q=80&w=800">

<img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=800">

</div>

<button onclick="showSurprise()">

Open Your Surprise ✨

</button>

<div id="surprise">

<div class="final-text">

I Love You So Much ❤️

</div>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
class="cat">

</div>

</div>

<script>

function showSurprise(){

document.getElementById("surprise").style.display="block";

}

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=Math.random()*3+3+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

}

setInterval(createHeart,350);

function createBalloon(){

const balloon=document.createElement("div");

balloon.classList.add("balloon");

balloon.innerHTML="🎈";

balloon.style.left=Math.random()*100+"vw";

balloon.style.animationDuration=Math.random()*5+6+"s";

balloon.onclick=function(){

balloon.classList.add("pop");

};

document.body.appendChild(balloon);

setTimeout(()=>{

balloon.remove();

},10000);

}

setInterval(createBalloon,1400);

</script>

</body>
</html>
